name: Deploy to AWS ECS

# Auto-triggers on every push to main, but the build/deploy jobs only RUN
# if AWS infrastructure is ready (see `AWS_DEPLOY_ENABLED` repo variable below).
# Until that variable is set to "true", those jobs SKIP (green ✓), so pushes
# don't show red failure noise.
#
# When you're ready to enable auto-deploy:
#   1. Provision AWS resources:
#        ECR repo:        hospitalos       (region ap-south-1)
#        ECS cluster:     hospitalos-production
#        ECS service:     hospitalos-production
#        Task def family: hospitalos-production
#   2. Add these GitHub SECRETS (Settings → Secrets and variables → Actions → Secrets):
#        AWS_ACCESS_KEY_ID
#        AWS_SECRET_ACCESS_KEY
#   3. Add this GitHub VARIABLE (same screen → Variables tab):
#        AWS_DEPLOY_ENABLED = true
#   4. Push anything to main → deploy runs automatically.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: hospitalos
  ECS_CLUSTER: hospitalos-production
  ECS_SERVICE: hospitalos-production
  TASK_FAMILY: hospitalos-production

jobs:
  # ── Step 1: Test ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint:ci

  # ── Step 2: Build & Push Docker Image ────────────────────────────────────
  build-and-push:
    needs: test
    # Skip cleanly (green ✓) unless AWS infra is ready.
    # Set the repo variable AWS_DEPLOY_ENABLED=true to enable.
    if: ${{ vars.AWS_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Step 3: Deploy to ECS ────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    if: ${{ vars.AWS_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: hospitalos
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment
        run: |
          echo "Deployment complete! Image: ${{ needs.build-and-push.outputs.image }}"
